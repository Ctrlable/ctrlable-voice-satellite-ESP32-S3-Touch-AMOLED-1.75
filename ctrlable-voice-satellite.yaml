external_components:
  - source: github://fuzzybear62/esphome-cst9217
    components: [ cst9217 ]

touchscreen:
  - platform: cst9217
    id: my_touchscreen
    i2c_id: bus_a
    interrupt_pin: GPIO11
    reset_pin: GPIO40
    on_touch:
      then:
        - logger.log:
            format: Touch %d at (%d, %d)
            args: [touch.id, touch.x, touch.y]
        - binary_sensor.template.publish:
            id: touch_input
            state: ON
    on_release:
      then:
        - binary_sensor.template.publish:
            id: touch_input
            state: OFF


# 1.75" Round AMOLED Display Configuration (466x466 with CO5300 Driver)
display:
  - platform: qspi_dbi
    model: CUSTOM
    id: main_display
    spi_id: display_spi
    cs_pin: GPIO12
    reset_pin: GPIO39
    data_rate: 80MHz
    # te_pin: GPIO13  # optional tearing effect sync
    dimensions:
      width: 466
      height: 466
    color_order: RGB
    invert_colors: false
    brightness: 255
    update_interval: never
    init_sequence:
      - [0x11]                 # Sleep Out
      - [0xFE, 0x00]           # Command Set extension
      - [0xC4, 0x80]           # SPI Interface Control (enable QSPI mode)
      - [0x3A, 0x55]           # Pixel Format: 16-bit/pixel
      - [0x53, 0x24]           # Display Control: STE + BCTRL (enables 0x51 brightness writes)
      - [0x63, 0xFF]           # Display Brightness (max brightness)
      - [0x29]                 # Display ON
      - [0x51, 0xD0]           # Write Display Brightness (normal brightness)
      - [0x58, 0x00]           # Disable contrast enhance

    pages:
      # Draws a glow ring centred at (cx,cy) with base radius br, fading inward
      # by in_spread px and outward by out_spread px, at normalised intensity g.
      # R/G/B are 0-255 peak channel values. Caller passes all args inline.

      - id: idle_page
        lambda: |-
          it.fill(Color::BLACK);
          float ms = millis();
          float t = fmodf(ms / 4000.0f, 1.0f);
          float g = 0.06f + ((sinf(t * 6.28318f) + 1.0f) * 0.5f) * 0.18f;
          int cx = 233, cy = 233;
          for (int i = 0; i <= 10; i++) {
            float f = (float)(10 - i) / 10.0f * g;
            it.circle(cx, cy, 205 + i, Color(0, (uint8_t)(120*f), (uint8_t)(220*f)));
          }
          for (int i = 1; i <= 18; i++) {
            float f = (float)(18 - i) / 18.0f * g;
            it.circle(cx, cy, 205 - i, Color(0, (uint8_t)(120*f), (uint8_t)(220*f)));
          }
          it.printf(cx, cy, id(font_response), Color(80, 80, 80), TextAlign::CENTER, "Ctrlable Pro");
          id(draw_timer_timeline).execute();
          id(draw_active_timer_widget).execute();

      - id: listening_page
        lambda: |-
          it.fill(Color::BLACK);
          float ms = millis();
          float t = fmodf(ms / 600.0f, 1.0f);
          float g = 0.45f + ((sinf(t * 6.28318f) + 1.0f) * 0.5f) * 0.55f;
          int cx = 233, cy = 233;
          for (int i = 0; i <= 10; i++) {
            float f = (float)(10 - i) / 10.0f * g;
            it.circle(cx, cy, 205 + i, Color(0, (uint8_t)(180*f), (uint8_t)(255*f)));
          }
          for (int i = 1; i <= 22; i++) {
            float f = (float)(22 - i) / 22.0f * g;
            it.circle(cx, cy, 205 - i, Color(0, (uint8_t)(180*f), (uint8_t)(255*f)));
          }
          id(draw_timer_timeline).execute();

      - id: thinking_page
        lambda: |-
          it.fill(Color::BLACK);
          float ms = millis();
          float t = fmodf(ms / 900.0f, 1.0f);
          int cx = 233, cy = 233;
          // Steady amber glow ring
          float sg = 0.35f;
          for (int i = 0; i <= 10; i++) {
            float f = (float)(10 - i) / 10.0f * sg;
            it.circle(cx, cy, 205 + i, Color((uint8_t)(255*f), (uint8_t)(140*f), 0));
          }
          for (int i = 1; i <= 15; i++) {
            float f = (float)(15 - i) / 15.0f * sg;
            it.circle(cx, cy, 205 - i, Color((uint8_t)(255*f), (uint8_t)(140*f), 0));
          }
          // 3 bouncing dots offset by 120 degrees each
          for (int d = 0; d < 3; d++) {
            float phase = fmodf(t + d / 3.0f, 1.0f);
            float bounce = (sinf(phase * 6.28318f) + 1.0f) * 0.5f;
            int y_off = (int)(-28 * bounce);
            uint8_t br = (uint8_t)(140 + 115 * bounce);
            it.filled_circle(cx + (d - 1) * 52, cy + y_off, 11,
                             Color(br, (uint8_t)(br * 0.55f), 0));
          }
          if (id(show_text).state) {
            it.printf(cx, cy + 55, id(font_request), Color(160, 90, 0),
                      TextAlign::CENTER, "%s", id(text_request).state.c_str());
          }
          id(draw_timer_timeline).execute();

      - id: replying_page
        lambda: |-
          it.fill(Color::BLACK);
          float ms = millis();
          int cx = 233, cy = 233;
          // Three outward-travelling rings (ripple)
          for (int w = 0; w < 3; w++) {
            float phase = fmodf(ms / 1200.0f + w / 3.0f, 1.0f);
            int r = (int)(160 + phase * 55);
            float fade = (1.0f - phase) * 0.85f;
            for (int i = 0; i <= 6; i++) {
              float f = (float)(6 - i) / 6.0f * fade;
              it.circle(cx, cy, r + i, Color(0, (uint8_t)(210*f), (uint8_t)(90*f)));
              if (i > 0)
                it.circle(cx, cy, r - i, Color(0, (uint8_t)(210*f), (uint8_t)(90*f)));
            }
          }
          if (id(show_text).state) {
            it.printf(cx, cy, id(font_response), Color(0, 180, 80),
                      TextAlign::CENTER, "%s", id(text_response).state.c_str());
          }
          id(draw_timer_timeline).execute();

      - id: timer_finished_page
        lambda: |-
          it.fill(Color::BLACK);
          float ms = millis();
          float t = fmodf(ms / 450.0f, 1.0f);
          float g = 0.5f + ((sinf(t * 6.28318f) + 1.0f) * 0.5f) * 0.5f;
          int cx = 233, cy = 233;
          for (int i = 0; i <= 10; i++) {
            float f = (float)(10 - i) / 10.0f * g;
            it.circle(cx, cy, 205 + i, Color(0, (uint8_t)(230*f), (uint8_t)(80*f)));
          }
          for (int i = 1; i <= 22; i++) {
            float f = (float)(22 - i) / 22.0f * g;
            it.circle(cx, cy, 205 - i, Color(0, (uint8_t)(230*f), (uint8_t)(80*f)));
          }
          it.printf(cx, cy, id(font_response), Color(0, (uint8_t)(230*g), (uint8_t)(80*g)),
                    TextAlign::CENTER, "Timer Done!");

      - id: error_page
        lambda: |-
          it.fill(Color::BLACK);
          float ms = millis();
          float t = fmodf(ms / 1400.0f, 1.0f);
          float g = 0.3f + ((sinf(t * 6.28318f) + 1.0f) * 0.5f) * 0.5f;
          int cx = 233, cy = 233;
          for (int i = 0; i <= 10; i++) {
            float f = (float)(10 - i) / 10.0f * g;
            it.circle(cx, cy, 205 + i, Color((uint8_t)(220*f), (uint8_t)(30*f), (uint8_t)(30*f)));
          }
          for (int i = 1; i <= 18; i++) {
            float f = (float)(18 - i) / 18.0f * g;
            it.circle(cx, cy, 205 - i, Color((uint8_t)(220*f), (uint8_t)(30*f), (uint8_t)(30*f)));
          }
          it.printf(cx, cy - 14, id(font_response), Color(220, 50, 50),
                    TextAlign::CENTER, "Error");
          it.printf(cx, cy + 14, id(font_response), Color(120, 30, 30),
                    TextAlign::CENTER, "Check logs");

      - id: no_ha_page
        lambda: |-
          it.fill(Color::BLACK);
          float ms = millis();
          float t = fmodf(ms / 2000.0f, 1.0f);
          float g = 0.25f + ((sinf(t * 6.28318f) + 1.0f) * 0.5f) * 0.35f;
          int cx = 233, cy = 233;
          for (int i = 0; i <= 10; i++) {
            float f = (float)(10 - i) / 10.0f * g;
            it.circle(cx, cy, 205 + i, Color((uint8_t)(220*f), (uint8_t)(150*f), 0));
          }
          for (int i = 1; i <= 18; i++) {
            float f = (float)(18 - i) / 18.0f * g;
            it.circle(cx, cy, 205 - i, Color((uint8_t)(220*f), (uint8_t)(150*f), 0));
          }
          it.printf(cx, cy - 14, id(font_response), Color(220, 150, 0),
                    TextAlign::CENTER, "No Server");
          it.printf(cx, cy + 14, id(font_response), Color(130, 80, 0),
                    TextAlign::CENTER, "Home Assistant");

      - id: no_wifi_page
        lambda: |-
          it.fill(Color::BLACK);
          float ms = millis();
          float t = fmodf(ms / 2000.0f, 1.0f);
          float g = 0.25f + ((sinf(t * 6.28318f) + 1.0f) * 0.5f) * 0.35f;
          int cx = 233, cy = 233;
          for (int i = 0; i <= 10; i++) {
            float f = (float)(10 - i) / 10.0f * g;
            it.circle(cx, cy, 205 + i, Color((uint8_t)(220*f), (uint8_t)(110*f), 0));
          }
          for (int i = 1; i <= 18; i++) {
            float f = (float)(18 - i) / 18.0f * g;
            it.circle(cx, cy, 205 - i, Color((uint8_t)(220*f), (uint8_t)(110*f), 0));
          }
          it.printf(cx, cy - 14, id(font_response), Color(220, 110, 0),
                    TextAlign::CENTER, "No WiFi");
          it.printf(cx, cy + 14, id(font_response), Color(130, 60, 0),
                    TextAlign::CENTER, "Connecting...");

      - id: initializing_page
        lambda: |-
          it.fill(Color::BLACK);
          float ms = millis();
          float t = fmodf(ms / 2000.0f, 1.0f);
          float g = 0.3f + ((sinf(t * 6.28318f) + 1.0f) * 0.5f) * 0.7f;
          int cx = 233, cy = 233;
          for (int i = 0; i <= 10; i++) {
            float f = (float)(10 - i) / 10.0f * g;
            it.circle(cx, cy, 205 + i, Color((uint8_t)(80*f), (uint8_t)(130*f), (uint8_t)(255*f)));
          }
          for (int i = 1; i <= 18; i++) {
            float f = (float)(18 - i) / 18.0f * g;
            it.circle(cx, cy, 205 - i, Color((uint8_t)(80*f), (uint8_t)(130*f), (uint8_t)(255*f)));
          }
          uint8_t tc = (uint8_t)(160 * g);
          it.printf(cx, cy, id(font_response), Color(tc, tc, 255),
                    TextAlign::CENTER, "Ctrlable Pro");

      - id: muted_page
        lambda: |-
          it.fill(Color::BLACK);
          float ms = millis();
          float t = fmodf(ms / 5000.0f, 1.0f);
          float g = 0.04f + ((sinf(t * 6.28318f) + 1.0f) * 0.5f) * 0.08f;
          int cx = 233, cy = 233;
          for (int i = 0; i <= 10; i++) {
            float f = (float)(10 - i) / 10.0f * g;
            it.circle(cx, cy, 205 + i, Color((uint8_t)(100*f), (uint8_t)(100*f), (uint8_t)(100*f)));
          }
          for (int i = 1; i <= 15; i++) {
            float f = (float)(15 - i) / 15.0f * g;
            it.circle(cx, cy, 205 - i, Color((uint8_t)(100*f), (uint8_t)(100*f), (uint8_t)(100*f)));
          }
          it.printf(cx, cy, id(font_response), Color(55, 55, 55),
                    TextAlign::CENTER, "Muted");
          id(draw_timer_timeline).execute();
          id(draw_active_timer_widget).execute();

interval:
  - interval: 40ms
    id: animation_interval
    then:
      - component.update: main_display

number:
  - platform: template
    name: "Screen Brightness"
    id: screen_brightness
    min_value: 0
    max_value: 255
    step: 1
    initial_value: 200
    set_action:
      - lambda: |-
          id(main_display).set_brightness(x / 255.0f);
